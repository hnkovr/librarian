# ──────────────────────────────────────────────────────────────────────────────
# librarian — settings SSoT. Scripts read ONLY from here (script_standards:
# settings_file_mandatory — inline defaults are forbidden, missing keys fail loud).
# Paths are relative to the HOST repo root (cwd of the CLI), not this repo.
# ──────────────────────────────────────────────────────────────────────────────
librarian:
  data_root: data
  history_dirname: .history

  # Files/dirs never inventoried or moved.
  skip_names: [".DS_Store", ".gitkeep", ".gitignore"]
  skip_prefixes: ["~$", ".~lock", ".~", "._"]
  skip_dir_names: [".git", ".history", "__pycache__", ".state", ".archive"]
  # Source subtrees handled out-of-band (e.g. embedded git repos → submodules).
  exclude_dir_fragments:
    - "ДЗ 4-5, вложения/dbt_project"
    - "ДЗ 4-5, вложения/clickhouse_hw"

  # Category by extension (lowercase, no dot); first match wins.
  categories:
    decks: [pptx, key, odp]
    docs: [pdf, docx, doc, md, txt, rtf, html, xlsx]
    media: [mp4, mov, avi, png, jpg, jpeg, svg, gif, webp]
    archives: [zip, tar, gz, tgz, 7z, rar]
    code: [sql, py, sh, ipynb, json, csv, xml, env, sample, toml, cfg, ini, log]
  category_default: misc
  # Name-based overrides (checked before extension mapping; substring, casefold).
  name_rules:
    - contains: ["шаблон", "template"]
      category: templates

  # Version-stack detection on the filename stem.
  version_pattern: '^(?P<base>.+?)[-_ ]v(?P<ver>\d+(?:\.\d+)*)$'
  copy_pattern: '^(?P<base>.+?) \((?P<n>\d+)\)$'

  # Filename normalization for destinations (repo convention: no spaces).
  normalize_space_to: "-"

  # git-lfs track patterns the host repo must carry for organized content.
  lfs_patterns: ["*.pptx", "*.pdf", "*.mp4", "*.zip", "*.docx", "*.key", "*.mov", "*.xlsx"]

  # State / output files (relative to host repo root).
  inventory_file: data/.state/librarian-inventory.yml
  plan_file: data/.state/librarian-plan.yml
  docprops_file: data/.state/librarian-docprops.yml
  reviews_file: data/reviews.yml
  catalog_file: data/CATALOG.md

  docprops:
    # Fonts treated as "code" when found in pptx runs (deterministic heuristic).
    monospace_fonts: ["Consolas", "Courier New", "Menlo", "JetBrains Mono", "Fira Code", "Courier", "Monaco", "Source Code Pro"]
    md_code_fence: "```"
    words_split_regex: '\s+'

  catalog:
    title: "# CATALOG — MLInside course data library"
    generated_note: >-
      Generated by `librarian catalog` (deterministic props) + curated reviews from
      `data/reviews.yml`. Regenerate with `just librarian-catalog`.
